<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Accang | Central System</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
:root{
--bg:#0a0a0c;--surface:#121216;--border:#27272a;
--primary:#2563eb;--text:#f4f4f5;--muted:#a1a1aa;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}
body{background:var(--bg);color:var(--text);display:flex;}

.sidebar{width:260px;background:var(--surface);padding:30px;border-right:1px solid var(--border);}
.brand{font-weight:700;margin-bottom:30px;}
.btn-logout{margin-top:20px;padding:10px;border:1px solid red;color:red;text-align:center;cursor:pointer;}

.main{flex:1;padding:40px;}
.panel{background:var(--surface);padding:25px;border-radius:10px;margin-bottom:20px;border:1px solid var(--border);}

input,select,textarea{
width:100%;padding:12px;margin-bottom:12px;
background:#000;border:1px solid var(--border);color:#fff;border-radius:6px;
}

button{padding:12px;border:none;background:#fff;color:#000;border-radius:6px;cursor:pointer;}

.card{
border:1px solid var(--border);
padding:15px;border-radius:10px;margin-bottom:10px;
display:flex;justify-content:space-between;align-items:center;
}

.actions button{
margin-left:5px;
padding:6px 10px;
border:none;
cursor:pointer;
border-radius:6px;
}

.edit{background:#2563eb;color:#fff;}
.delete{background:#ef4444;color:#fff;}
</style>
</head>

<body>

<div class="sidebar">
<div class="brand">System Manager</div>
<div class="btn-logout" onclick="logout()">Logout</div>
</div>

<div class="main">

<div class="panel">
<h2>Tambah / Edit Data</h2>

<select id="kategori">
<option value="acc_projects">Project</option>
<option value="acc_tools">Tools</option>
</select>

<input id="nama" placeholder="Nama">
<textarea id="deskripsi" placeholder="Deskripsi"></textarea>
<input id="path" placeholder="Link / Path">
<input id="icon" placeholder="Icon emoji">

<input type="file" id="img">

<button onclick="saveData()">Simpan</button>
</div>

<div class="panel">
<h2>Data List</h2>
<div id="list"></div>
</div>

</div>

<script>
if(sessionStorage.getItem("isAdmin")!=="true"){
location.href="index.html";
}

let editIndex=null;
let editKey=null;

/* SAVE */
function saveData(){
let kat=document.getElementById("kategori").value;
let nama=document.getElementById("nama").value;
let desc=document.getElementById("deskripsi").value;
let link=document.getElementById("path").value;
let icon=document.getElementById("icon").value;
let file=document.getElementById("img").files[0];

function process(imgBase64){
let db=JSON.parse(localStorage.getItem(kat))||[];

let data={
name:nama,
desc:desc,
link:link,
icon:icon,
img:imgBase64
};

if(editIndex!==null){
db[editIndex]=data;
editIndex=null;
editKey=null;
}else{
db.push(data);
}

localStorage.setItem(kat,JSON.stringify(db));
alert("Saved!");
loadData();
clearForm();
}

if(file){
let reader=new FileReader();
reader.onload=e=>process(e.target.result);
reader.readAsDataURL(file);
}else{
process("");
}
}

/* LOAD */
function loadData(){
let list=document.getElementById("list");
list.innerHTML="";

["acc_projects","acc_tools"].forEach(key=>{
let db=JSON.parse(localStorage.getItem(key))||[];

db.forEach((item,i)=>{
list.innerHTML+=`
<div class="card">
<div>
<b>${item.name}</b><br>
<small>${item.desc}</small>
</div>
<div class="actions">
<button class="edit" onclick="editData('${key}',${i})">Edit</button>
<button class="delete" onclick="deleteData('${key}',${i})">Hapus</button>
</div>
</div>
`;
});
});
}

/* DELETE */
function deleteData(key,i){
let db=JSON.parse(localStorage.getItem(key))||[];

if(confirm("Hapus data ini?")){
db.splice(i,1);
localStorage.setItem(key,JSON.stringify(db));
loadData();
}
}

/* EDIT */
function editData(key,i){
let db=JSON.parse(localStorage.getItem(key))||[];
let data=db[i];

document.getElementById("kategori").value=key;
document.getElementById("nama").value=data.name;
document.getElementById("deskripsi").value=data.desc;
document.getElementById("path").value=data.link;
document.getElementById("icon").value=data.icon;

editIndex=i;
editKey=key;
}

/* CLEAR */
function clearForm(){
document.getElementById("nama").value="";
document.getElementById("deskripsi").value="";
document.getElementById("path").value="";
document.getElementById("icon").value="";
document.getElementById("img").value="";
}

/* LOGOUT */
function logout(){
sessionStorage.removeItem("isAdmin");
location.href="index.html";
}

/* INIT */
loadData();
</script>

</body>
</html>
