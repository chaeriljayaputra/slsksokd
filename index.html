            margin-bottom: 10px;
            font-size: 0.78rem;
            letter-spacing: 1px;
        }

        .domain-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px 12px;
        }

        .domain-tags span {
            transition: color 0.3s ease;
            cursor: default;
        }

        .domain-tags span:hover {
            color: #a0a0a0;
        }

        .footer-credit {
            text-align: center;
            padding: 30px 20px;
            font-size: 0.7rem;
            color: #505050;
            letter-spacing: 1px;
        }

        .footer-credit a {
            color: #606060;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .footer-credit a:hover {
            color: #909090;
        }

        @media screen and (max-width: 768px) {
            .hero-name {
                font-size: 3rem;
            }

            .skills-container {
                padding: 32px 18px;
            }

            .skills-header h2 {
                font-size: 1.8rem;
            }

            .skills-grid {
                grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
                gap: 12px;
            }

            .pricing-cards {
                grid-template-columns: 1fr;
            }

            .cta-wrapper h2 {
                font-size: 2rem;
            }
        }

        @media screen and (max-width: 480px) {
            .hero-name {
                font-size: 2.2rem;
            }

            .hero-title {
                font-size: 0.82rem;
            }

            .skills-grid {
                grid-template-columns: 1fr 1fr;
                gap: 10px;
            }

            .skill-card {
                padding: 16px 12px;
            }

            .skill-card h3 {
                font-size: 0.8rem;
            }

            .skill-card p {
                font-size: 0.68rem;
            }

            .social-icon-circle {
                width: 42px;
                height: 42px;
                font-size: 1rem;
            }
        }
    </style>
</head>
