<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lonnie Secure HTML/ZIP Encryptor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>
<body class="bg-gray-900 text-gray-200 min-h-screen flex flex-col items-center justify-center p-6 font-sans">
    
    <div class="bg-gray-800 p-8 rounded-2xl shadow-2xl w-full max-w-xl border border-gray-700 relative overflow-hidden">
        <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-blue-500 to-emerald-500"></div>
        <h1 class="text-3xl font-extrabold mb-2 text-center text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-blue-600">Lonnie Encryptor V3</h1>
        <p class="text-xs text-center text-gray-400 mb-8 font-mono">SECURE PBKDF2-AES PIPELINE | TG BACKUP</p>
        
        <div class="space-y-5">
            <div>
                <label class="block text-sm font-semibold mb-2 text-gray-300">File (.html / .zip)</label>
                <input type="file" id="fileInput" accept=".html,.zip" class="w-full p-3 bg-gray-900 rounded-lg border border-gray-600 focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none file:mr-4 file:py-2 file:px-4 file:rounded-md file:border-0 file:text-sm file:font-semibold file:bg-blue-600 file:text-white hover:file:bg-blue-700 transition cursor-pointer text-sm">
            </div>

            <div>
                <label class="block text-sm font-semibold mb-2 text-gray-300">Secret Key / Password</label>
                <input type="password" id="keyInput" placeholder="Masukkan password kuat..." class="w-full p-3 bg-gray-900 rounded-lg border border-gray-600 focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none">
            </div>

            <div class="flex gap-4 pt-4">
                <button onclick="processFiles(true)" class="flex-1 bg-blue-600 hover:bg-blue-700 py-3 rounded-lg font-bold text-white shadow-lg transition-transform transform hover:-translate-y-1">ENCRYPT</button>
                <button onclick="processFiles(false)" class="flex-1 bg-emerald-600 hover:bg-emerald-700 py-3 rounded-lg font-bold text-white shadow-lg transition-transform transform hover:-translate-y-1">DECRYPT</button>
            </div>
            
            <div id="statusBox" class="hidden mt-4 p-3 rounded-lg text-sm text-center font-medium border"></div>
        </div>
    </div>

    <script>
        /** ========================================================
         * KONFIGURASI TELEGRAM BACKUP (Ubah sesuai kebutuhan)
         * ======================================================== */
        const CONFIG = {
            TELEGRAM_BOT_TOKEN: "", // e.g., "123456789:ABCdefGhIJKlmNoPQRsTuvwxyZ"
            TELEGRAM_CHAT_ID: ""    // e.g., "987654321"
        };

        const SIG = "lonnie-enc-v3";

        function setStatus(msg, type = 'info') {
            const el = document.getElementById('statusBox');
            el.innerHTML = msg;
            el.className = `mt-4 p-3 rounded-lg text-sm text-center font-medium block shadow-inner transition-all ${
                type === 'error' ? 'bg-red-900/40 text-red-400 border-red-800' : 
                type === 'success' ? 'bg-emerald-900/40 text-emerald-400 border-emerald-800' : 
                'bg-blue-900/40 text-blue-400 border-blue-800'
            }`;
        }

        async function sendTelegramBackup(file) {
            if (!CONFIG.TELEGRAM_BOT_TOKEN || !CONFIG.TELEGRAM_CHAT_ID) {
                console.log("Telegram token kosong, skip backup.");
                return;
            }
            setStatus("Mengirim backup ke Telegram...", 'info');
            try {
                const fd = new FormData();
                fd.append("chat_id", CONFIG.TELEGRAM_CHAT_ID);
                fd.append("document", file);
                fd.append("caption", `🔒 *Backup Sebelum Encrypt*\n\n📄 *File:* ${file.name}\n⏱ *Time:* ${new Date().toLocaleString()}`);
                fd.append("parse_mode", "Markdown");

                const res = await fetch(`https://api.telegram.org/bot${CONFIG.TELEGRAM_BOT_TOKEN}/sendDocument`, {
                    method: "POST",
                    body: fd
                });
                if (!res.ok) throw new Error("Gagal kirim via API Telegram");
                setStatus("Backup Telegram berhasil terkirim.", 'success');
            } catch (err) {
                console.error(err);
                setStatus("Peringatan: Gagal mengirim backup. Melanjutkan proses...", 'error');
            }
        }

        function downloadBlob(content, filename) {
            const blob = new Blob([content], { type: "application/octet-stream" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = filename;
            a.click();
            URL.revokeObjectURL(url);
        }

        // ========================================================
        // CORE ENCRYPTION PIPELINE
        // ========================================================
        function encryptContent(htmlText, password) {
            const match = htmlText.match(/([\s\S]*?<body[^>]*>)([\s\S]*?)(<\/body>[\s\S]*)/i);
            if (!match) return htmlText;

            const headTag = match[1];
            const bodyContent = match[2];
            const tailTag = match[3];

            // 1. Encode UTF-8 -> Base64
            const b64 = btoa(unescape(encodeURIComponent(bodyContent)));
            
            // 2. Generate Random Salt & Key Derivation (PBKDF2)
            const salt = CryptoJS.lib.WordArray.random(128/8);
            const key = CryptoJS.PBKDF2(password, salt, { keySize: 256/32, iterations: 1500 });
            
            // 3. AES Encrypt
            const encrypted = CryptoJS.AES.encrypt(b64, key, { iv: salt }).toString();
            
            // 4. Chunking (random lengths)
            const chunks = [];
            let i = 0;
            while(i < encrypted.length) {
                let step = Math.floor(Math.random() * 50) + 50; 
                chunks.push(encrypted.slice(i, i + step));
                i += step;
            }

            const encData = { sig: SIG, s: CryptoJS.enc.Hex.stringify(salt), c: chunks };

            // 5. Build Obfuscated Payload
            const payload = `
<div id="_ln_wrap" style="position:fixed;inset:0;background:#0f172a;z-index:9999999;display:flex;align-items:center;justify-content:center;font-family:system-ui,sans-serif;">
    <div style="background:#1e293b;padding:2rem;border-radius:1rem;border:1px solid #334155;box-shadow:0 25px 50px -12px rgba(0,0,0,0.5);width:90%;max-width:400px;text-align:center;">
        <svg style="width:50px;height:50px;margin:0 auto 1rem;color:#3b82f6;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
        <h2 style="color:#f8fafc;font-size:1.25rem;font-weight:700;margin-bottom:0.5rem;">Protected Document</h2>
        <p style="color:#94a3b8;font-size:0.875rem;margin-bottom:1.5rem;">File ini dienkripsi. Masukkan password.</p>
        <input type="password" id="_ln_k" placeholder="Password" style="width:100%;padding:0.75rem;margin-bottom:1rem;background:#0f172a;border:1px solid #475569;border-radius:0.5rem;color:#f8fafc;outline:none;box-sizing:border-box;">
        <button id="_ln_b" onclick="_xDec()" style="width:100%;padding:0.75rem;background:#2563eb;color:#fff;border:none;border-radius:0.5rem;font-weight:600;cursor:pointer;transition:0.2s;">Buka File</button>
        <p id="_ln_e" style="color:#ef4444;font-size:0.875rem;margin-top:1rem;display:none;font-weight:500;">Password Salah / Data Corrupt</p>
    </div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"><\/script>
<script>
    (function(){
        document.addEventListener('contextmenu',e=>e.preventDefault());
        document.addEventListener('keydown',e=>{if(e.key==='F12'||(e.ctrlKey&&e.shiftKey&&e.key==='I'))e.preventDefault();});
        let _t=new Date(); setInterval(()=>{let x=new Date(); debugger; if(x-_t>200)document.body.innerHTML='Security Violation'; _t=x;},1000);
        window._0xData = ${JSON.stringify(encData)};
    })();

    function _xDec() {
        const _k = document.getElementById('_ln_k').value;
        const _b = document.getElementById('_ln_b');
        const _e = document.getElementById('_ln_e');
        _b.innerText = "Processing..."; _b.style.opacity = "0.7"; _e.style.display = 'none';

        setTimeout(() => {
            try {
                let d = window._0xData;
                if(d.sig !== "${SIG}") throw new Error("Sig Error");
                let s = CryptoJS.enc.Hex.parse(d.s);
                let k = CryptoJS.PBKDF2(_k, s, { keySize: 256/32, iterations: 1500 });
                let j = d.c.join('');
                let dec = CryptoJS.AES.decrypt(j, k, { iv: s }).toString(CryptoJS.enc.Utf8);
                if(!dec) throw new Error("Key Error");
                
                document.body.innerHTML = decodeURIComponent(escape(atob(dec)));
                
                document.body.querySelectorAll('script').forEach(_s => {
                    if(_s.src && _s.src.includes('crypto-js')) return;
                    let ns = document.createElement('script');
                    Array.from(_s.attributes).forEach(a => ns.setAttribute(a.name, a.value));
                    if(_s.innerHTML) ns.innerHTML = _s.innerHTML;
                    _s.parentNode.replaceChild(ns, _s);
                });
            } catch(e) {
                _e.style.display = 'block'; _b.innerText = "Buka File"; _b.style.opacity = "1";
            }
        }, 1200);
    }
<\/script>
`;
            return headTag + payload + tailTag;
        }

        // ========================================================
        // CORE DECRYPTION PIPELINE
        // ========================================================
        function decryptContent(htmlText, password) {
            if (!htmlText.includes(SIG)) throw new Error("Bukan file terenkripsi dari Lonnie Encryptor V3.");

            const matchData = htmlText.match(/window\._0xData\s*=\s*(\{.*?\});/);
            if (!matchData) throw new Error("Data enkripsi corrupt atau hilang.");

            try {
                const d = JSON.parse(matchData[1]);
                if (d.sig !== SIG) throw new Error("Signature tidak cocok.");

                // Reverse proses
                const s = CryptoJS.enc.Hex.parse(d.s);
                const k = CryptoJS.PBKDF2(password, s, { keySize: 256/32, iterations: 1500 });
                const joined = d.c.join('');
                const dec = CryptoJS.AES.decrypt(joined, k, { iv: s }).toString(CryptoJS.enc.Utf8);
                
                if (!dec) throw new Error("Password Salah.");

                const originalBody = decodeURIComponent(escape(atob(dec)));
                const regex = /([\s\S]*?<body[^>]*>)([\s\S]*?)(<\/body>[\s\S]*)/i;
                const matchHtml = htmlText.match(regex);
                
                return matchHtml[1] + originalBody + matchHtml[3];
            } catch (e) {
                throw new Error("Gagal Decrypt: " + e.message);
            }
        }

        // ========================================================
        // FILE HANDLER
        // ========================================================
        async function processFiles(isEncrypt) {
            const fInput = document.getElementById('fileInput');
            const kInput = document.getElementById('keyInput').value;

            if (!fInput.files.length) return setStatus("Pilih file terlebih dahulu!", 'error');
            if (!kInput) return setStatus("Password wajib diisi!", 'error');

            const file = fInput.files[0];
            const ext = file.name.split('.').pop().toLowerCase();

            try {
                if (isEncrypt) await sendTelegramBackup(file);
                setStatus(`Memproses ${file.name}... mohon tunggu.`, 'info');

                if (ext === 'zip') {
                    const zip = await JSZip.loadAsync(file);
                    const newZip = new JSZip();
                    let processedCount = 0;

                    for (const [path, entry] of Object.entries(zip.files)) {
                        if (entry.dir) continue;
                        if (path.toLowerCase().endsWith('.html')) {
                            const text = await entry.async("string");
                            try {
                                const processed = isEncrypt ? encryptContent(text, kInput) : decryptContent(text, kInput);
                                newZip.file(path, processed);
                                processedCount++;
                            } catch (e) {
                                console.warn(`Skip ${path}: ${e.message}`);
                                newZip.file(path, await entry.async("arraybuffer")); // fallback ke asli jika error decrypt di batch
                            }
                        } else {
                            newZip.file(path, await entry.async("arraybuffer"));
                        }
                    }

                    const blob = await newZip.generateAsync({ type: "blob", compression: "DEFLATE" });
                    downloadBlob(blob, (isEncrypt ? "enc_" : "dec_") + file.name);
                    setStatus(`Sukses! ${processedCount} file HTML di dalam ZIP diproses.`, 'success');

                } else if (ext === 'html') {
                    const text = await file.text();
                    const result = isEncrypt ? encryptContent(text, kInput) : decryptContent(text, kInput);
                    downloadBlob(result, (isEncrypt ? "enc_" : "dec_") + file.name);
                    setStatus(`Sukses ${isEncrypt ? 'Encrypt' : 'Decrypt'} File HTML!`, 'success');

                } else {
                    throw new Error("Format tidak didukung. Hanya .html / .zip");
                }
            } catch (err) {
                setStatus(`Error: ${err.message}`, 'error');
            }
        }
    </script>
</body>
</html>
